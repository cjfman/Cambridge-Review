  summary: see if the {{CPD}} can be prevented from hiring sworn officer who was hired
    on or after January 20, 2025 by Immigration and Customs Enforcement, Homeland
    Security Investigations, or Customs and Border Patrol
  category: city-requests
  original: That the City Manager be and hereby is requested to direct the relevant
    City staff and departments to examine if and how the City may prevent the hiring
    by the Cambridge Police Department of any sworn officer who was hired by Immigration
    and Customs Enforcement, Homeland Security Investigations, or Customs and Border
    Patrol, and report back to the City Council in a timely manner
- uid: POR 2026-30
  summary: examine the feasibility of allowing thirdparty guarantors or co-signers
    for applicants to Inclusionary Housing
  category: city-requests
  original: That the City Manager is requested to direct the Community Development
    Department (CDD) to examine the feasibility, legal considerations, and administrative
    requirements of permitting qualified thirdparty guarantors or co-signers for applicants
    to Inclusionary Housing units and provide recommendations as to whether such a
    policy could responsibly expand access to these units
- uid: POR 2026-31
  summary: '"draft ordinance language restricting the use of City-owned or City-controlled
    property, facilities, resources, and personnel for the purposes of federal civil
    immigration enforcement"'
  category: city-requests
  original: That the City Manager is hereby requested to direct the Law Department
    to draft ordinance language restricting the use of City-owned or City-controlled
    property, facilities, resources, and personnel for the purposes of federal civil
    immigration enforcement, and that the Law Department evaluate whether these protections
    should be adopted as an amendment to the Welcoming Community Ordinance
- uid: POR 2026-32
  summary: raise the parking permit fee to $75 with exemptions for income qualifying
    residents, remove the senior exemption, and lower the number of cars that individuals
    are allowed to permit for from four to two
  category: city-requests
  original: That the City Manager is requested to work with relevant City departments
    to raise the fee of the parking permit program for all residents to $75, consider
    how to include a self-identified check off option so as not to increase administrative
    costs for a subsidized fee of $25 for residents who live in affordable housing,
    are enrolled in a program such as SNAP or are low income, remove the senior exemption
    for the residential parking permit program and lower the number of cars that individual
    residents are allowed to get a residential parking permit for from four to two
