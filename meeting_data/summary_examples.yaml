    "to develop a plan to renovate and expand 240 Albany Street in order to provide
    additional low threshold shelter, housing and day time services"
  category: city-requests
  original: That the City Manager is requested to begin discussions with MIT, CASPAR,
    the co-chairs of the Human Services and Veterans Committee, all relevant city
